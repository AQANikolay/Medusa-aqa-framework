name: Medusa API Tests

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'

permissions:
  contents: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medusa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Tests
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Clone & Setup Medusa Backend
        run: |
          git clone https://github.com/medusajs/medusa-starter-default backend
          cd backend
          npm install --no-fund --no-audit

      - name: Run Migrations & Create Admin
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/medusa
          REDIS_URL: redis://localhost:6379
        run: |
          npx medusa db:migrate
          npx medusa user -e admin@medusa-test.com -p supersecret || true

      - name: Start Medusa Backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/medusa
          REDIS_URL: redis://localhost:6379
          BROWSER: none
        run: |
          nohup npx medusa develop > /tmp/medusa.log 2>&1 &
          echo $! > /tmp/medusa.pid
          
          echo "⏳ Ждём API..."
          for i in {1..120}; do
            if curl -sf http://localhost:9000/health > /dev/null 2>&1; then
              echo "✅ API готов!"
              exit 0
            fi
            echo "Попытка $i/120..."
            sleep 3
          done
          
          echo "❌ API не запустился!"
          cat /tmp/medusa.log
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run API Tests ONLY
        env:
          BASE_API_URL: http://localhost:9000
          ADMIN_EMAIL: admin@medusa-test.com
          ADMIN_PASSWORD: supersecret
        run: |
          pytest tests/api/ -v --alluredir=allure-results -m api || true

      - name: Stop Backend
        if: always()
        run: |
          kill $(cat /tmp/medusa.pid) 2>/dev/null || true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Telegram Notification
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🤖 Medusa API Tests
            
            📊 Статус: ${{ job.status }}
            🔗 Репо: ${{ github.repository }}
            
            📈 Allure:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/